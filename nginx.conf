server {
    listen 80;
    server_name runner.binakasihnusantara.sch.id;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name runner.binakasihnusantara.sch.id;

    # SSL - Hostinger biasanya sudah provide ini
    ssl_certificate /etc/letsencrypt/live/runner.binakasihnusantara.sch.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/runner.binakasihnusantara.sch.id/privkey.pem;

    # Frontend (Next.js) - port 3000
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API - port 5000
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
